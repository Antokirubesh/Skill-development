    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Details Form</title>
</head>
<body>

    <h2>Student Details Form</h2>

    <form>
        <label>Name:</label><br>
        <input type="text" name="name" placeholder="Enter your name"><br><br>

        <label>College Name:</label><br>
        <input type="text" name="college" placeholder="Enter college name"><br><br>

        <label>Roll No:</label><br>
        <input type="text" name="rollno" placeholder="Enter roll number"><br><br>

        <label>University:</label><br>
        <select name="university">
            <option value="">Select University</option>
            <option value="anna">Anna University</option>
            <option value="madras">University of Madras</option>
            <option value="bharathiar">Bharathiar University</option>
            <option value="others">Others</option>
        </select><br><br>

        <input type="submit" value="Submit">
    </form>

</body>

</body>
